

# Workspace Assignments
windowrule = match:class ^(brave-browser)$, workspace 2
windowrule = match:class ^(org.gnome.Nautilus)$, workspace 3
windowrule = match:class ^(Spotify)$, workspace 5

# Rules
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Rules for Impala and Bluetui (v3 Syntax)
windowrule {
    name = networking_tools
    match:class = ^(impala|bluetui)$
    float = on
    center = on
    size = 900 900
}

windowrule {
    name = system_tools
    match:class = ^(btop)$
    float = on
    center = on
    size =1300 850
}

windowrule {
    name = sessions
    match:class = ^(power-sh)$
    float = on
    center = on
    size = 400 360
}

windowrule {
    name = screenshot
    match:class = ^(ss-sh)$
    float = on
    center = on
    size = 390 310
}

windowrule {
    name = volume
    match:class = ^(vol)$
    float = on
    center = on
    size = 800 510
}






