# Max gamma limit (0-200)
max-gamma = 150

# Day profile (Standard colors)
profile {
    time = 06:00
    identity = true
    gamma = 1.0
}

# Evening profile (Warmer)
profile {
    time = 18:00
    temperature = 5000
    gamma = 0.9
}

# Night profile (Very warm/dim)
profile {
    time = 22:00
    temperature = 3500
    gamma = 0.8
}
