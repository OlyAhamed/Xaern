# ==============================================
# OsakaJade - Sway Colors
# ==============================================

set $bg          #161d1b
set $fg          #d4e0d8
set $primary     #3d9970
set $on_primary  #0d1210
set $secondary   #7ab89a
set $on_sec      #0d1210
set $tertiary    #c4a882
set $surface     #1c2421
set $on_surface  #d4e0d8
set $surf_var    #243028
set $on_surf_var #a8c0b0
set $surf_con    #2a3830
set $surf_hi     #324038
set $surf_lo     #111614
set $error       #c4726a
set $on_error    #0d1210
set $outline     #587868
set $outline_var #324038
set $inverse_sur #d4e0d8
set $inverse_pri #2a6b50
set $magenta     #a07898
set $cyan        #6ab0a8
set $blue        #5888a8

#                       border        background    text          indicator     child_border
client.focused          $primary     $primary     $on_primary  $secondary   $primary
client.focused_inactive $outline_var $surf_hi     $on_surf_var $outline_var $outline_var
client.unfocused        $outline_var $bg          $outline     $outline_var $outline_var
client.urgent           $error       $error       $on_primary  $error       $error
